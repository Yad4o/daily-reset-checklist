<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daily Reset</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#080807" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Daily Reset" />
  <link rel="apple-touch-icon" href="icon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Mono:wght@300;400&family=Marcellus&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #080807;
      --surface: #0e0d0c;
      --surface-2: #141310;
      --border: rgba(196,162,90,0.12);
      --border-hover: rgba(196,162,90,0.25);
      --gold: #C4A25A;
      --gold-light: #E2C87A;
      --gold-muted: rgba(196,162,90,0.5);
      --text: #E8E2D4;
      --text-dim: #8A8070;
      --text-muted: #4A4438;
      --success: #7DB88E;
      --font-serif: 'Cormorant Garamond', Georgia, serif;
      --font-display: 'Marcellus', Georgia, serif;
      --font-mono: 'DM Mono', 'Courier New', monospace;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-mono);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    /* Noise overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.6;
    }

    #root { position: relative; z-index: 1; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--gold-muted); border-radius: 2px; }

    /* ── HEADER ── */
    .header {
      padding: 52px 24px 36px;
      position: relative;
      overflow: hidden;
    }
    .header::after {
      content: '';
      position: absolute;
      bottom: 0; left: 24px; right: 24px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold-muted), transparent);
    }

    .header-eyebrow {
      font-family: var(--font-mono);
      font-size: 9px;
      letter-spacing: 4px;
      color: var(--gold);
      text-transform: uppercase;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .header-eyebrow::before {
      content: '';
      display: inline-block;
      width: 24px;
      height: 1px;
      background: var(--gold-muted);
    }

    .header-title {
      font-family: var(--font-display);
      font-size: 52px;
      letter-spacing: 0.04em;
      line-height: 0.95;
      color: var(--text);
      margin-bottom: 6px;
    }
    .header-title span { color: var(--gold); }

    .header-date {
      font-family: var(--font-serif);
      font-style: italic;
      font-size: 16px;
      color: var(--text-dim);
      margin: 16px 0 24px;
      letter-spacing: 0.02em;
    }

    /* ── OVERALL PROGRESS ── */
    .overall-progress {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px 22px;
      margin: 28px 20px 0;
    }

    .op-top {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 14px;
    }
    .op-label {
      font-family: var(--font-mono);
      font-size: 9px;
      letter-spacing: 3px;
      color: var(--text-muted);
      text-transform: uppercase;
    }
    .op-percent {
      font-family: var(--font-display);
      font-size: 36px;
      color: var(--gold);
      line-height: 1;
    }
    .op-count {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-dim);
    }

    .op-bar-track {
      height: 2px;
      background: rgba(255,255,255,0.06);
      border-radius: 1px;
      overflow: hidden;
      margin-bottom: 6px;
    }
    .op-bar-fill {
      height: 100%;
      border-radius: 1px;
      background: linear-gradient(90deg, #8B6A2E, var(--gold), var(--gold-light));
      transition: width 0.6s cubic-bezier(0.34,1.56,0.64,1);
      position: relative;
    }
    .op-bar-fill::after {
      content: '';
      position: absolute;
      right: 0; top: -2px;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--gold-light);
      box-shadow: 0 0 6px var(--gold);
    }

    .op-perfect {
      margin-top: 14px;
      padding: 10px 14px;
      border-radius: 8px;
      background: rgba(125,184,142,0.08);
      border: 1px solid rgba(125,184,142,0.2);
      font-family: var(--font-serif);
      font-style: italic;
      font-size: 14px;
      color: var(--success);
      text-align: center;
      letter-spacing: 0.03em;
      animation: fadeUp 0.4s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── SECTIONS CONTAINER ── */
    .sections-wrap {
      padding: 24px 20px 100px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    /* ── SECTION CARD ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      transition: border-color 0.2s;
    }
    .card:hover { border-color: var(--border-hover); }
    .card.all-done { border-color: rgba(125,184,142,0.25); }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 18px;
      cursor: pointer;
      user-select: none;
      gap: 12px;
    }
    .card-header:active { opacity: 0.85; }

    .card-left {
      display: flex;
      align-items: center;
      gap: 13px;
      flex: 1;
      min-width: 0;
    }

    .card-emoji {
      font-size: 20px;
      flex-shrink: 0;
      width: 32px;
      text-align: center;
    }

    .card-title-wrap { min-width: 0; }
    .card-title {
      font-family: var(--font-display);
      font-size: 15px;
      letter-spacing: 0.05em;
      line-height: 1.1;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .card.all-done .card-title { color: var(--success); }
    .card-subtitle {
      font-family: var(--font-mono);
      font-size: 9px;
      letter-spacing: 2px;
      color: var(--text-muted);
      margin-top: 3px;
      text-transform: uppercase;
    }

    .card-right {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    .card-mini-ring {
      position: relative;
      width: 34px;
      height: 34px;
      flex-shrink: 0;
    }
    .card-mini-ring svg {
      transform: rotate(-90deg);
    }
    .ring-track {
      stroke: rgba(255,255,255,0.06);
      fill: none;
    }
    .ring-fill {
      fill: none;
      stroke-linecap: round;
      transition: stroke-dashoffset 0.4s cubic-bezier(0.34,1.56,0.64,1);
    }
    .card-mini-count {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-mono);
      font-size: 8px;
      color: var(--text-dim);
    }

    .card-chevron {
      color: var(--text-muted);
      font-size: 13px;
      transition: transform 0.25s ease;
      flex-shrink: 0;
    }
    .card-chevron.open { transform: rotate(90deg); }

    /* ── BODY (items) ── */
    .card-body {
      border-top: 1px solid var(--border);
      overflow: hidden;
      max-height: 0;
      transition: max-height 0.35s cubic-bezier(0.4,0,0.2,1);
    }
    .card-body.open {
      max-height: 2000px;
    }

    .card-note {
      padding: 10px 18px;
      font-family: var(--font-serif);
      font-style: italic;
      font-size: 12px;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border);
      letter-spacing: 0.03em;
    }

    .item-row {
      display: flex;
      align-items: center;
      gap: 13px;
      padding: 12px 18px;
      cursor: pointer;
      border-bottom: 1px solid rgba(255,255,255,0.03);
      transition: background 0.15s;
      user-select: none;
    }
    .item-row:last-child { border-bottom: none; }
    .item-row:hover { background: rgba(196,162,90,0.04); }
    .item-row:active { background: rgba(196,162,90,0.08); }

    .item-check {
      width: 18px;
      height: 18px;
      border-radius: 4px;
      border: 1px solid rgba(196,162,90,0.25);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s cubic-bezier(0.34,1.56,0.64,1);
      position: relative;
    }
    .item-check.done {
      border-color: transparent;
    }
    .item-check svg {
      opacity: 0;
      transform: scale(0);
      transition: all 0.2s cubic-bezier(0.34,1.56,0.64,1);
    }
    .item-check.done svg {
      opacity: 1;
      transform: scale(1);
    }

    .item-label {
      font-family: var(--font-mono);
      font-size: 12px;
      line-height: 1.5;
      color: var(--text);
      transition: all 0.2s;
      letter-spacing: 0.01em;
    }
    .item-label.done {
      color: var(--text-muted);
      text-decoration: line-through;
      text-decoration-color: var(--text-muted);
    }

    /* ── FOOTER ── */
    .footer {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 16px 24px 28px;
      background: linear-gradient(0deg, var(--bg) 60%, transparent);
      display: flex;
      align-items: center;
      justify-content: space-between;
      z-index: 10;
    }

    .footer-quote {
      font-family: var(--font-serif);
      font-style: italic;
      font-size: 12px;
      color: var(--text-muted);
      letter-spacing: 0.03em;
      flex: 1;
    }

    .reset-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-dim);
      font-family: var(--font-mono);
      font-size: 9px;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      padding: 9px 16px;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
      flex-shrink: 0;
    }
    .reset-btn:hover {
      border-color: rgba(196,162,90,0.4);
      color: var(--gold);
      background: rgba(196,162,90,0.05);
    }

    /* ── Divider ornament ── */
    .ornament {
      text-align: center;
      color: var(--border);
      font-size: 14px;
      letter-spacing: 4px;
      margin: 4px 0;
      user-select: none;
    }

    @keyframes shimmer {
      0% { background-position: -200% center; }
      100% { background-position: 200% center; }
    }

    .gold-shimmer {
      background: linear-gradient(90deg, var(--gold) 0%, var(--gold-light) 40%, var(--gold) 80%);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shimmer 3s linear infinite;
    }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const sections = [
  { id:"morning",  emoji:"🌅", title:"Morning",         subtitle:"5:30 AM",           color:"#C4873A", items:["Wake up","Drink water","Open curtains for sunlight","No scrolling reels after waking","Freshen up / toilet","Wear gym clothes"] },
  { id:"gym",      emoji:"🏋️", title:"Gym",             subtitle:"5:45 – 6:45 AM",     color:"#C45A5A", items:["Workout properly","Drink water during workout","Don't touch face","Small cooldown / stretch"] },
  { id:"bath",     emoji:"🚿", title:"After Gym & Bath", subtitle:"Hygiene",            color:"#5A8FC4", items:["Shampoo (only 2–3× /week)","Conditioner on lengths","Soap underarms","Soap neck","Soap chest","Soap groin","Soap feet","Wash body properly","Dry body properly","Pat face dry gently"] },
  { id:"skincare", emoji:"🧴", title:"Morning Skincare", subtitle:"Look fresh",         color:"#5AC48F", items:["Derma Co face wash","Pond's light moisturizer","Sunscreen SPF 50","Deodorant on underarms","Comb hair"] },
  { id:"breakfast",emoji:"🍳", title:"Breakfast",        subtitle:"Fuel up",           color:"#C4A25A", items:["Eat protein","Avoid junk breakfast","Drink water"], note:"eggs · oats · poha + peanuts · curd · banana" },
  { id:"prep",     emoji:"💼", title:"Before Internship", subtitle:"Be ready",         color:"#8B6A3A", items:["Clean clothes","Water bottle filled","Laptop & charger ready","Wallet / keys / essentials checked"] },
  { id:"internship",emoji:"💻",title:"Internship",       subtitle:"10:30 AM – 7 PM",   color:"#5A6A8F", items:["Good posture","Drink water regularly","Avoid mindless scrolling","Walk during breaks","Stretch body sometimes","Eat lunch properly"] },
  { id:"lunch",    emoji:"🍱", title:"Lunch",            subtitle:"Midday fuel",       color:"#C4B45A", items:["Eat protein source","Don't overeat","Avoid cold drinks"], note:"chicken + rice · dal + chapati · paneer · eggs · curd" },
  { id:"evening",  emoji:"☀️", title:"Evening",          subtitle:"Wind down",         color:"#C4713A", items:["Small walk","Light snack only if hungry","No binge eating","Limit junk food"] },
  { id:"dinner",   emoji:"🍽️", title:"Dinner",           subtitle:"Light & clean",     color:"#3A6A7A", items:["Controlled portion","Protein included","Drink water"] },
  { id:"night",    emoji:"🌙", title:"Night Routine",    subtitle:"Reset for tomorrow", color:"#7A5AC4", items:["Derma Co face wash","Small amount moisturizer","Brush teeth","Clean tongue","Fill water bottle","Clothes ready for tomorrow","Room slightly clean"] },
  { id:"sleep",    emoji:"🛏️", title:"Before Sleep",     subtitle:"Lights out 10:30–11 PM", color:"#3A4A7A", items:["No heavy scrolling","Lights dim","Room cool","Sleep by 10:30–11 PM"] },
  { id:"health",   emoji:"💧", title:"Daily Health",     subtitle:"Non-negotiables",   color:"#3A8FC4", items:["3–4 L water","No cold drinks","No excessive sugar","No random junk snacking","Good posture","Sunlight exposure","Enough steps"] },
  { id:"glowup",   emoji:"🔥", title:"Glow-Up",          subtitle:"Look the part",     color:"#C4823A", items:["Clean nails","Clean shoes/slippers","Fresh clothes","Good smell / deodorant","Hair maintained","Pillow cover clean"] },
  { id:"weekly",   emoji:"📅", title:"Weekly Tasks",     subtitle:"Do these regularly", color:"#7A8C3A", items:["Change pillow cover","Wash bedsheet","Clean room","Organize desk","Trim nails","Wash shoes if dirty"] },
  { id:"prod",     emoji:"🧠", title:"Productivity",     subtitle:"Grow daily",        color:"#8B3AC4", items:["Learn something daily","Coding / DSA practice","Chess practice","Read / docs learning","Limit reels & social media"] },
  { id:"rules",    emoji:"⚔️", title:"Main Rules",       subtitle:"Live by these",     color:"#C43A3A", items:["Consistency > perfection","Don't quit after one bad day","Small progress daily matters","Sleep properly","Keep environment clean","Stay disciplined when motivation is low"] },
];

const getDayKey = () => new Date().toISOString().split("T")[0];

const formatDate = () => {
  const d = new Date();
  return d.toLocaleDateString("en-IN", { weekday:"long", day:"numeric", month:"long", year:"numeric" });
};

function MiniRing({ done, total, color }) {
  const r = 13;
  const circ = 2 * Math.PI * r;
  const pct = total === 0 ? 0 : done / total;
  const offset = circ - pct * circ;
  return (
    <div className="card-mini-ring">
      <svg width="34" height="34" viewBox="0 0 34 34">
        <circle className="ring-track" cx="17" cy="17" r={r} strokeWidth="2" />
        <circle
          className="ring-fill"
          cx="17" cy="17" r={r}
          strokeWidth="2"
          stroke={done === total ? "#7DB88E" : color}
          strokeDasharray={circ}
          strokeDashoffset={offset}
        />
      </svg>
      <div className="card-mini-count">{done}/{total}</div>
    </div>
  );
}

function SectionCard({ section, checked, onToggle }) {
  const [open, setOpen] = React.useState(false);
  const done = section.items.filter((_, i) => checked[section.id + "_" + i]).length;
  const total = section.items.length;
  const allDone = done === total;

  return (
    <div className={`card${allDone ? " all-done" : ""}`}>
      <div className="card-header" onClick={() => setOpen(o => !o)}>
        <div className="card-left">
          <div className="card-emoji">{section.emoji}</div>
          <div className="card-title-wrap">
            <div className="card-title">{section.title}</div>
            <div className="card-subtitle">{section.subtitle}</div>
          </div>
        </div>
        <div className="card-right">
          <MiniRing done={done} total={total} color={section.color} />
          <div className={`card-chevron${open ? " open" : ""}`}>›</div>
        </div>
      </div>

      <div className={`card-body${open ? " open" : ""}`}>
        {section.note && <div className="card-note">{section.note}</div>}
        {section.items.map((item, i) => {
          const isDone = !!checked[section.id + "_" + i];
          return (
            <div key={i} className="item-row" onClick={() => onToggle(section.id, i)}>
              <div className={`item-check${isDone ? " done" : ""}`} style={{ background: isDone ? section.color + "22" : "transparent", borderColor: isDone ? section.color : undefined }}>
                <svg width="9" height="7" viewBox="0 0 9 7" fill="none">
                  <path d="M1 3.5L3.2 5.5L8 1" stroke={section.color} strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"/>
                </svg>
              </div>
              <span className={`item-label${isDone ? " done" : ""}`}>{item}</span>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function App() {
  const [checked, setChecked] = React.useState({});
  const dayKey = getDayKey();

  React.useEffect(() => {
    const s = localStorage.getItem("dreset_" + dayKey);
    if (s) { try { setChecked(JSON.parse(s)); } catch {} }
  }, []);

  React.useEffect(() => {
    localStorage.setItem("dreset_" + dayKey, JSON.stringify(checked));
  }, [checked]);

  const toggle = (sid, idx) => {
    const k = sid + "_" + idx;
    setChecked(p => ({ ...p, [k]: !p[k] }));
  };

  const total = sections.reduce((a, s) => a + s.items.length, 0);
  const done  = Object.values(checked).filter(Boolean).length;
  const pct   = total === 0 ? 0 : Math.round((done / total) * 100);
  const perfect = pct === 100;

  return (
    <div>
      {/* Header */}
      <div className="header">
        <div className="header-eyebrow">Daily Life Reset</div>
        <div className="header-title">
          Today's<br /><span className="gold-shimmer">Ritual</span>
        </div>
        <div className="header-date">{formatDate()}</div>
      </div>

      {/* Overall progress */}
      <div className="overall-progress">
        <div className="op-top">
          <div>
            <div className="op-label">Overall Progress</div>
            <div className="op-count" style={{ marginTop: 4 }}>{done} of {total} tasks</div>
          </div>
          <div className={`op-percent${perfect ? " gold-shimmer" : ""}`}>{pct}<span style={{ fontSize: 18 }}>%</span></div>
        </div>
        <div className="op-bar-track">
          <div className="op-bar-fill" style={{ width: pct + "%" }} />
        </div>
        {perfect && (
          <div className="op-perfect">✦ Perfect day. You crushed it. ✦</div>
        )}
      </div>

      {/* Sections */}
      <div className="sections-wrap">
        {sections.map((s, i) => (
          <React.Fragment key={s.id}>
            {i > 0 && i % 4 === 0 && <div className="ornament">· · ·</div>}
            <SectionCard section={s} checked={checked} onToggle={toggle} />
          </React.Fragment>
        ))}
      </div>

      {/* Footer */}
      <div className="footer">
        <div className="footer-quote">Consistency &gt; Perfection</div>
        <button className="reset-btn" onClick={() => setChecked({})}>Reset Day</button>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
